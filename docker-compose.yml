services:
  hub:
    build:
      context: .
      dockerfile: build/hub/Dockerfile
    image: nudged-hub:local
    ports:
      - "8080:8080"
    environment:
      - NUDGED_HUB_SECRET=${NUDGED_HUB_SECRET:-}

  agent:
    build:
      context: .
      dockerfile: build/agent/Dockerfile
    image: nudged-agent:local
    depends_on:
      - hub
    environment:
      - HUB_ADDR=ws://hub:8080/ws/register
      - AGENT_ID=agent-local
      - AGENT_NAME=agent-local
      - AGENT_ADDR=agent:8081
      - AGENT_APPS=testsvc
    ports:
      - "8081:8081"
    restart: unless-stopped

  testsvc:
    build:
      context: examples/test-service
      dockerfile: Dockerfile
    image: nudged-testsvc:local
    ports:
      - "8082:8082"
    environment:
      - STARTUP_DELAY=${TESTSVC_STARTUP_DELAY:-0}
      - FLAKY_RATE=${TESTSVC_FLAKY_RATE:-0}
    restart: unless-stopped

  caddy:
    image: caddy:2
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "2015:2015"
    depends_on:
      - hub
