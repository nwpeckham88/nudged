services:
  hub:
    build:
      context: .
      dockerfile: build/hub/Dockerfile
    image: nudged-hub:local
    ports:
      - "8080:8080"
    environment:
      - NUDGED_HUB_SECRET=devsecret

  agent:
    build:
      context: .
      dockerfile: internal/agent/Dockerfile
    image: nudged-agent:local
    depends_on:
      hub:
        condition: service_healthy
    environment:
      - HUB_ADDR=ws://hub:8080/ws/register
      - AGENT_ID=agent-docker
      - AGENT_NAME=agent-docker
      - AGENT_ADDR=agent:8081
      - NUDGED_HUB_SECRET=devsecret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8081"
    restart: unless-stopped

  testsvc:
    image: nginx:alpine
    ports:
      - "8082:80"
    labels:
      - "nudged.enable=true"
      - "nudged.name=testsvc"
      - "nudged.port=80"
      - "nudged.timeout=5m"
    restart: unless-stopped
    stop_signal: SIGQUIT

  simsvc:
    build:
      context: .
      dockerfile: cmd/sim-service/Dockerfile
    image: nudged-sim:local
    environment:
      - STARTUP_DELAY=5s
      - SHUTDOWN_DELAY=2s
      - PORT=8080
    labels:
      - "nudged.enable=true"
      - "nudged.name=simsvc"
      - "nudged.port=8080"
      - "nudged.timeout=30s" # Short timeout for testing
    restart: unless-stopped
